name: CANVAS Tweet Pipeline

on:
  schedule:
    # Runs Mon–Fri at 9:00 AM UTC (adjust timezone offset as needed)
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # Allow manual runs from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies (canvas)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Write .env.local from secrets
        run: |
          printf 'APIFY_API_KEY=%s\nGOOGLE_DRIVE_FOLDER_ID=%s\n' \
            '${{ secrets.APIFY_API_KEY }}' \
            '${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}' > .env.local

      - name: Write service-account.json from secret
        run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Build Next.js app
        run: npm run build

      - name: Start server
        run: |
          npm run start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done

      - name: Step 1 — Fetch tweets from Apify
        id: fetch
        run: |
          echo "Fetching tweets (may take 1-3 min)..."
          RESPONSE=$(curl -s --max-time 300 -X POST http://localhost:3000/api/fetch-tweets \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "fetch-tweets failed: $RESPONSE"
            exit 1
          fi

          TWEET_COUNT=$(echo "$RESPONSE" | jq '.tweets | length')
          echo "Found $TWEET_COUNT new tweets"
          echo "tweet_count=$TWEET_COUNT" >> $GITHUB_OUTPUT

          # Save to file to avoid shell escaping issues with quotes/apostrophes
          echo "$RESPONSE" | jq '.tweets' > /tmp/tweets.json

      - name: Step 2 — Generate PNG + MP4 files
        id: generate
        if: steps.fetch.outputs.tweet_count != '0'
        run: |
          RESPONSE=$(curl -s --max-time 300 -X POST http://localhost:3000/api/generate \
            -H "Content-Type: application/json" \
            -d "{\"tweets\": $(cat /tmp/tweets.json)}")
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "generate failed: $RESPONSE"
            exit 1
          fi

          echo "$RESPONSE" | jq '.files' > /tmp/files.json
          echo "Generate complete — $(echo "$RESPONSE" | jq '.files | length') files"

      - name: Prepare empty files list (no new tweets)
        if: steps.fetch.outputs.tweet_count == '0'
        run: |
          echo "No new tweets — creating empty folder on Drive."
          echo '[]' > /tmp/files.json

      - name: Step 3 — Upload to Google Drive
        run: |
          RESPONSE=$(curl -s --max-time 120 -X POST http://localhost:3000/api/upload-drive \
            -H "Content-Type: application/json" \
            -d "{\"files\": $(cat /tmp/files.json)}")
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "upload-drive failed: $RESPONSE"
            exit 1
          fi

          echo "Pipeline complete."
          echo "https://drive.google.com/drive/folders/0AEw3aJ2mMki4Uk9PVA"

      - name: Clean up secrets from disk
        if: always()
        run: rm -f .env.local service-account.json
